%YAML:1.0
# OpenVINS (MSCKF VIO) config for the sim OAK-D Lite + Microstrain IMU — STEREO.
# Tuned for the sim's modest cameras (2x 320x240, ~6.3 Hz) on the Husky in the pipeline
# world. Based on OpenVINS' euroc_mav example (OpenVINS' parser wants ALL of these
# keys present); only the stereo / intrinsic / init lines below are changed from it.
# See docs/m3-vio.md for the reasoning behind the non-default choices.

verbosity: "INFO"

use_fej: true
integration: "rk4"

# --- STEREO (OAK-D Lite L/R pair, 0.075 m baseline) ---
# Switched from mono: monocular VIO is scale-degenerate on a smooth planar UGV (no
# IMU accel excitation -> scale unobservable -> filter diverges, and static/dynamic
# init won't even fire). The stereo baseline makes depth/scale directly observable.
# cam0=LEFT, cam1=RIGHT; extrinsics in kalibr_imucam_chain.yaml (cam_overlaps set).
use_stereo: true
max_cameras: 2

# The sim intrinsics/extrinsics are EXACT (we computed them), so don't waste
# observability estimating them online — fewer free states = a more stable filter
# on a low-rate stereo stream. Time is perfectly synced in sim, so no timeoffset.
calib_cam_extrinsics: false
calib_cam_intrinsics: false
calib_cam_timeoffset: false
calib_imu_intrinsics: false
calib_imu_g_sensitivity: false

max_clones: 11
max_slam: 50
max_slam_in_update: 25
max_msckf_in_update: 40
dt_slam_delay: 1

gravity_mag: 9.80              # gz Harmonic default gravity (changed from 9.81)

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

# zero velocity update parameters
try_zupt: false
zupt_chi2_multipler: 0
zupt_max_velocity: 0.1
zupt_noise_multiplier: 10
zupt_max_disparity: 0.5
zupt_only_at_beginning: false

# ==================================================================
# --- initialization (the usual VIO pain point) ---
# Static init fires when it sees a "jerk" (accel variance > thresh) after a still
# start: the Husky begins parked, then drives — so init triggers as it moves off.
# Lower the jerk threshold (gentle sim acceleration) and scale max_disparity down
# for the 320-wide image (euroc's 10 is tuned for a 752-wide image).
init_window_time: 1.5
init_imu_thresh: 0.5
init_max_disparity: 4.0
init_max_features: 40

init_dyn_use: false
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.05
init_dyn_mle_max_threads: 6
init_dyn_num_pose: 6
init_dyn_min_deg: 10.0
init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-12
init_dyn_bias_g: [ 0.0, 0.0, 0.0 ]
init_dyn_bias_a: [ 0.0, 0.0, 0.0 ]

# ==================================================================
record_timing_information: false
record_timing_filepath: "/tmp/traj_timing.txt"
save_total_state: false
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

# ==================================================================
# --- front-end (KLT feature tracker) ---
use_klt: true
num_pts: 150                   # features per frame (sim frame yields a few hundred corners)
fast_threshold: 20
grid_x: 5
grid_y: 5
min_px_dist: 8
knn_ratio: 0.70
track_frequency: 21.0
downsample_cameras: false
num_opencv_threads: 4
histogram_method: "HISTOGRAM"

use_aruco: false
num_aruco: 1024
downsize_aruco: true

# ==================================================================
up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

use_mask: false

relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"
